workflows:

  # ───────────────────────────────────────────────────────────────────
  # 1.  iOS Profile – sideload build (no codesigning required)
  #
  #     Profile mode = release-like performance but with observatory
  #     disabled. Unlike debug builds, profile apps CAN be launched
  #     from the iOS home screen (debug mode is blocked on iOS 14+).
  #
  #     Use this workflow to get an unsigned .app → convert to IPA →
  #     sign with Sideloadly/AltStore using a free Apple ID.
  #
  #     Uses Xcode 26 + Flutter 3.38.6 — required for App Store
  #     submissions from 28 April 2026 and for the iOS 26 WebKit fix.
  # ───────────────────────────────────────────────────────────────────
  ios-profile:
    name: "iOS Profile (sideload / device test)"
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: 3.38.6  # minimum for iOS 26 WebKit touch fix (engine-level WKWebView hitTest)
      xcode: 26        # iOS 26 SDK — Apple aligned Xcode version numbers at WWDC25
      cocoapods: default

    cache:
      cache_paths:
        - $CM_BUILD_DIR/ios/Pods
        # NOTE: pub-cache intentionally NOT cached — device_info_plus 12.4.0
        # ships an unpatched .m file; caching would restore the unpatched copy
        # and defeat the patch step below. Remove this comment once the package
        # releases a Xcode-26-compatible version.

    scripts:
      - name: Print environment
        script: |
          flutter --version
          xcodebuild -version
          pod --version

      - name: Get Flutter packages
        script: flutter pub get

      - name: Patch device_info_plus for Xcode 26
        script: |
          # device_info_plus <=12.4.0 calls [NSProcessInfo processInfo].isiOSAppOnVision
          # without a compile-time SDK availability guard. Xcode 26 treats this as a hard
          # error. We replace ONLY the property-access expression (not the whole line) so
          # the surrounding code structure (if-blocks, assignments, etc.) stays intact.
          # On iPhone, isiOSAppOnVision is always NO — it only applies on visionOS.
          python3 - <<'PYEOF'
import os, glob, sys

pattern = os.path.expanduser(
    "~/.pub-cache/hosted/pub.dev/device_info_plus-*"
    "/ios/device_info_plus/Sources/device_info_plus/FPPDeviceInfoPlusPlugin.m"
)
files = glob.glob(pattern)
print("[patch] searching:", pattern)
print("[patch] found", len(files), "file(s)")

if not files:
    print("[patch] ERROR: file not found — listing pub-cache device_info entries:")
    base = os.path.expanduser("~/.pub-cache/hosted/pub.dev")
    for entry in os.listdir(base):
        if "device_info" in entry:
            print(" ", os.path.join(base, entry))
    sys.exit(1)

# Replace only the property-access expression — leaves the surrounding
# code (if @available blocks, assignments, etc.) completely untouched.
TARGET = "[NSProcessInfo processInfo].isiOSAppOnVision"
REPLACEMENT = "NO"

for filepath in files:
    with open(filepath, "r") as fh:
        content = fh.read()
    count = content.count(TARGET)
    print("[patch]", count, "occurrence(s) of TARGET in", filepath)
    if count > 0:
        patched = content.replace(TARGET, REPLACEMENT)
        with open(filepath, "w") as fh:
            fh.write(patched)
        print("[patch] SUCCESS — replaced", count, "occurrence(s)")
        print("[patch] context around replacement:")
        for i, line in enumerate(patched.splitlines(), 1):
            if "isiOSAppOnVision" in line or "NO" in line.split("//")[0]:
                if 30 <= i <= 40:
                    print(f"  {i:3d}: {line}")
    else:
        print("[patch] already clean or expression has different form — lines containing isiOSAppOnVision:")
        for i, line in enumerate(content.splitlines(), 1):
            if "isiOSAppOnVision" in line:
                print(f"  {i:3d}: {line}")
PYEOF

      - name: Build iOS profile (no codesign)
        script: |
          flutter build ios \
            --profile \
            --no-codesign \
            --verbose

    artifacts:
      - build/ios/iphoneos/Runner.app

  # ───────────────────────────────────────────────────────────────────
  # 2.  iOS Release → TestFlight / App Store
  #
  #     Before enabling this workflow you must configure in the
  #     Codemagic dashboard (App settings → Environment variables):
  #
  #       APP_STORE_CONNECT_PRIVATE_KEY       – contents of .p8 API key file
  #       APP_STORE_CONNECT_KEY_IDENTIFIER    – 10-char key ID
  #       APP_STORE_CONNECT_ISSUER_ID         – UUID from App Store Connect
  #
  #     And in App settings → Code signing (iOS):
  #       • Distribution certificate (.p12) + password
  #       • App Store provisioning profile for com.example.mhealthapp
  #         (must include HealthKit capability)
  #
  #     Bundle ID: com.example.mhealthapp  ← update before first release
  # ───────────────────────────────────────────────────────────────────
  ios-release:
    name: "iOS Release (TestFlight)"
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: 3.38.6
      xcode: 26
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.example.mhealthapp
      vars:
        BUNDLE_ID: com.example.mhealthapp

    cache:
      cache_paths:
        - $CM_BUILD_DIR/ios/Pods

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Patch device_info_plus for Xcode 26
        script: |
          python3 - <<'PYEOF'
          import os, glob, sys

          pattern = os.path.expanduser(
              "~/.pub-cache/hosted/pub.dev/device_info_plus-*"
              "/ios/device_info_plus/Sources/device_info_plus/FPPDeviceInfoPlusPlugin.m"
          )
          files = glob.glob(pattern)
          print(f"[patch] found {len(files)} file(s)")

          if not files:
              print("[patch] ERROR: FPPDeviceInfoPlusPlugin.m not found")
              sys.exit(1)

          for filepath in files:
              with open(filepath, "r") as fh:
                  lines = fh.readlines()
              changed = False
              out = []
              for line in lines:
                  if "isiOSAppOnVision" in line:
                      out.append('    data[@"isiOSAppOnVision"] = @NO; // Xcode 26 patch\n')
                      print(f"[patch] replaced line in {filepath}")
                      changed = True
                  else:
                      out.append(line)
              if changed:
                  with open(filepath, "w") as fh:
                      fh.writelines(out)
                  print(f"[patch] SUCCESS: {filepath}")
              else:
                  print(f"[patch] already clean: {filepath}")
          PYEOF

      - name: Build signed IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=$CM_EXPORT_OPTIONS_PATH

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  # ───────────────────────────────────────────────────────────────────
  # 3.  Android Debug APK
  # ───────────────────────────────────────────────────────────────────
  android-debug:
    name: "Android Debug APK"
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      flutter: 3.38.6

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build debug APK
        script: flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  # ───────────────────────────────────────────────────────────────────
  # 4.  Android Release AAB (Google Play)
  #
  #     Requires in Codemagic dashboard:
  #       CM_KEYSTORE        – base64-encoded .jks keystore
  #       CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
  #       GPLAY_SERVICE_ACCOUNT_CREDENTIALS – JSON key for Play API
  # ───────────────────────────────────────────────────────────────────
  android-release:
    name: "Android Release (Google Play)"
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      flutter: 3.38.6
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: com.example.mhealthapp

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches

    scripts:
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/release.keystore
          cat >> "$CM_BUILD_DIR/android/key.properties" << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/release.keystore
          EOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build release AAB
        script: |
          flutter build appbundle \
            --release

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
