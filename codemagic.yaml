workflows:

  # ───────────────────────────────────────────────────────────────────
  # 1.  iOS Profile – sideload build (no codesigning required)
  #
  #     Profile mode = release-like performance but with observatory
  #     disabled. Unlike debug builds, profile apps CAN be launched
  #     from the iOS home screen (debug mode is blocked on iOS 14+).
  #
  #     Use this workflow to get an unsigned .app → convert to IPA →
  #     sign with Sideloadly/AltStore using a free Apple ID.
  #
  #     Uses Xcode 26 + Flutter 3.38.6 — required for App Store
  #     submissions from 28 April 2026 and for the iOS 26 WebKit fix.
  # ───────────────────────────────────────────────────────────────────
  ios-profile:
    name: "iOS Profile (sideload / device test)"
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: 3.38.6  # minimum for iOS 26 WebKit touch fix (engine-level WKWebView hitTest)
      xcode: 26        # iOS 26 SDK — Apple aligned Xcode version numbers at WWDC25
      cocoapods: default

    cache:
      cache_paths:
        - $CM_BUILD_DIR/ios/Pods
        # NOTE: pub-cache intentionally NOT cached — device_info_plus 12.4.0
        # ships an unpatched .m file; caching would restore the unpatched copy
        # and defeat the patch step below. Remove this comment once the package
        # releases a Xcode-26-compatible version.

    scripts:
      - name: Print environment
        script: |
          flutter --version
          xcodebuild -version
          pod --version

      - name: Get Flutter packages
        script: flutter pub get

      - name: Patch device_info_plus for Xcode 26
        script: |
          set -e
          echo "[patch] searching for FPPDeviceInfoPlusPlugin.m ..."
          FILE=$(find "$HOME/.pub-cache" -name "FPPDeviceInfoPlusPlugin.m" -type f | head -1)

          if [ -z "$FILE" ]; then
            echo "[patch] ERROR: file not found – dumping device_info entries:"
            find "$HOME/.pub-cache" -path "*device_info*" | head -30 || true
            exit 1
          fi

          echo "[patch] found: $FILE"
          echo "[patch] all isiOSAppOnVision lines before patch:"
          grep -n "isiOSAppOnVision" "$FILE" || true

          chmod u+w "$FILE"

          # The actual code in device_info_plus-12.4.0 uses ObjC message-send syntax:
          #   [info isiOSAppOnVision]   (where 'info' is an NSProcessInfo* local var)
          # NOT dot-notation [NSProcessInfo processInfo].isiOSAppOnVision.
          # Xcode 26 rejects the selector because isiOSAppOnVision is visionOS-only
          # and not declared in the iOS 26 SDK headers.
          # Replace the ObjC message send with NO — always NO on iPhone anyway.
          perl -pi -e 's/\[\w+\s+isiOSAppOnVision\]/NO/g' "$FILE"

          echo "[patch] all isiOSAppOnVision lines after patch:"
          grep -n "isiOSAppOnVision" "$FILE" || true

          # Verify: only the ObjC method CALL form is dangerous.
          # Variable names and dict keys (@"isiOSAppOnVision") are fine and will remain.
          REMAINING=$(grep -cE '\[\w+ isiOSAppOnVision\]' "$FILE" || true)
          echo "[patch] dangerous method-call occurrences remaining: $REMAINING"

          if [ "$REMAINING" -gt "0" ]; then
            echo "[patch] FAILED – ObjC message-send call still present"
            exit 1
          fi

          echo "[patch] SUCCESS – $FILE patched cleanly"

      - name: Build iOS profile (no codesign)
        script: |
          flutter build ios \
            --profile \
            --no-codesign \
            --verbose

    artifacts:
      - build/ios/iphoneos/Runner.app

  # ───────────────────────────────────────────────────────────────────
  # 2.  iOS Release → TestFlight / App Store
  #
  #     Before enabling this workflow you must configure in the
  #     Codemagic dashboard (App settings → Environment variables):
  #
  #       APP_STORE_CONNECT_PRIVATE_KEY       – contents of .p8 API key file
  #       APP_STORE_CONNECT_KEY_IDENTIFIER    – 10-char key ID
  #       APP_STORE_CONNECT_ISSUER_ID         – UUID from App Store Connect
  #
  #     And in App settings → Code signing (iOS):
  #       • Distribution certificate (.p12) + password
  #       • App Store provisioning profile for com.example.mhealthapp
  #         (must include HealthKit capability)
  #
  #     Bundle ID: com.example.mhealthapp  ← update before first release
  # ───────────────────────────────────────────────────────────────────
  ios-release:
    name: "iOS Release (TestFlight)"
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: 3.38.6
      xcode: 26
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.example.mhealthapp
      vars:
        BUNDLE_ID: com.example.mhealthapp

    cache:
      cache_paths:
        - $CM_BUILD_DIR/ios/Pods

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Patch device_info_plus for Xcode 26
        script: |
          FILE=$(find "$HOME/.pub-cache" -name "FPPDeviceInfoPlusPlugin.m" -type f | head -1)
          [ -n "$FILE" ] && chmod u+w "$FILE" && perl -pi -e 's/\[\w+\s+isiOSAppOnVision\]/NO/g' "$FILE" && echo "[patch] done: $FILE" || echo "[patch] file not found"

      - name: Build signed IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=$CM_EXPORT_OPTIONS_PATH

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  # ───────────────────────────────────────────────────────────────────
  # 3.  Android Debug APK
  # ───────────────────────────────────────────────────────────────────
  android-debug:
    name: "Android Debug APK"
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      flutter: 3.38.6

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build debug APK
        script: flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  # ───────────────────────────────────────────────────────────────────
  # 4.  Android Release AAB (Google Play)
  #
  #     Requires in Codemagic dashboard:
  #       CM_KEYSTORE        – base64-encoded .jks keystore
  #       CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
  #       GPLAY_SERVICE_ACCOUNT_CREDENTIALS – JSON key for Play API
  # ───────────────────────────────────────────────────────────────────
  android-release:
    name: "Android Release (Google Play)"
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      flutter: 3.38.6
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: com.example.mhealthapp

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches

    scripts:
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/release.keystore
          cat >> "$CM_BUILD_DIR/android/key.properties" << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/release.keystore
          EOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build release AAB
        script: |
          flutter build appbundle \
            --release

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
