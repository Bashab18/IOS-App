name: mhealthapp
description: "A Flutter mHealth application with Apple HealthKit and Android Health Connect integration."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Data / Storage ───────────────────────────────────────────────
  sqflite: ^2.4.2         # SQLite local database
  path: ^1.9.1            # File-system path utilities (used with sqflite)
  shared_preferences: ^2.5.5  # Lightweight key-value persistence
  uuid: ^4.5.3            # UUID generation for DB primary keys

  # ── Health / Sensors ─────────────────────────────────────────────
  health: ^13.3.1         # Apple HealthKit + Android Health Connect
  permission_handler: ^12.0.1  # Runtime permission requests

  # ── Background Tasks ─────────────────────────────────────────────
  workmanager: ^0.9.0     # Background sync (BGTaskScheduler on iOS)

  # ── UI / Charts ──────────────────────────────────────────────────
  fl_chart: ^1.2.0        # Activity statistics line/bar charts
  intl: ^0.20.2           # Date/number formatting

  # ── Media ────────────────────────────────────────────────────────
  youtube_player_iframe: ^5.2.2  # Cross-platform YouTube player (iOS + Android)

  # ── Web / Browser ────────────────────────────────────────────────
  flutter_inappwebview: ^6.1.5  # In-app ChatGPT webview (WKWebView / iOS 26 WebKit)
  url_launcher: ^6.3.2          # Open external links in system browser

  # ── Data Parsing ─────────────────────────────────────────────────
  csv: ^6.0.0             # Parse exercise CSV data file (8.x removed CsvToListConverter)
  crypto: ^3.0.7          # SHA-256 password hashing

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/home_page1.png
    - images/cup.png
    - images/welcome_illustration.png
    - images/success.png
    - images/avatar1.png
    - images/avatar2.png
    - images/avatar3.png
    - images/avatar4.png
    - images/avatar5.png
    - images/avatar6.png
    - images/avatar7.png
    - images/avatar8.png
    - images/avatar9.png
    - images/user.jpeg
    - images/merged_exercises.csv
