name: mhealthapp
description: "A Flutter mHealth application with Apple HealthKit and Android Health Connect integration."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Data / Storage ───────────────────────────────────────────────
  sqflite: ^2.4.2         # SQLite local database (PrivacyInfo.xcprivacy covers file APIs)
  path: ^1.9.1            # File-system path utilities
  shared_preferences: ^2.5.5  # Lightweight key-value persistence (UserDefaults → PrivacyInfo)
  uuid: ^4.5.3            # UUID generation for DB primary keys

  # ── Health / Sensors ─────────────────────────────────────────────
  # v13.3.1 = latest stable; iOS 26 new HealthKit types (medications, mental
  # health questionnaires) are not yet in the Dart wrapper — update to v14.x
  # when published by carp.dk.
  health: ^13.3.1         # Apple HealthKit + Android Health Connect
  permission_handler: ^12.0.1  # Runtime permission requests

  # ── Background Tasks ─────────────────────────────────────────────
  # workmanager_apple ships its own PrivacyInfo.xcprivacy since v0.8.0
  workmanager: ^0.9.0     # Background sync (BGTaskScheduler on iOS)

  # ── UI / Charts ──────────────────────────────────────────────────
  fl_chart: ^1.2.0        # Activity statistics line/bar charts
  intl: ^0.20.2           # Date/number formatting (Dart-only)

  # ── Media ────────────────────────────────────────────────────────
  youtube_player_iframe: ^5.2.2  # YouTube player (delegates to webview_flutter)

  # ── Web / Browser ────────────────────────────────────────────────
  # iOS 26 WebKit touch bug is fixed in the Flutter 3.38.6 engine — no
  # flutter_inappwebview code change needed, just pin Flutter ≥3.38.6
  # in codemagic.yaml. Watch for 6.2.0 stable for SPM + further fixes.
  flutter_inappwebview: ^6.1.5  # In-app ChatGPT webview (WKWebView)
  url_launcher: ^6.3.2          # Open external links in system browser

  # ── Data Parsing ─────────────────────────────────────────────────
  csv: ^6.0.0             # csv 8.x removed CsvToListConverter — stay on 6.x
  crypto: ^3.0.7          # SHA-256 password hashing (Dart-only)

  # ── Transitive overrides ──────────────────────────────────────────
  # device_info_plus is pulled in by health / permission_handler.
  # Pinning here lets pub resolve the latest patch (≥12.4.0) which may
  # contain the Xcode 26 isiOSAppOnVision fix; the Podfile post_install
  # patch is the guaranteed fallback if it hasn't been released yet.
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/home_page1.png
    - images/cup.png
    - images/welcome_illustration.png
    - images/success.png
    - images/avatar1.png
    - images/avatar2.png
    - images/avatar3.png
    - images/avatar4.png
    - images/avatar5.png
    - images/avatar6.png
    - images/avatar7.png
    - images/avatar8.png
    - images/avatar9.png
    - images/user.jpeg
    - images/merged_exercises.csv
